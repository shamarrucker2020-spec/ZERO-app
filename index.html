const {useState,useEffect,useRef}=React;
const RED="#ff3a5c",BLUE="#3a8fff",PURPLE="#9b5cff",GREEN="#3aff8a";
const NC=[RED,BLUE,PURPLE,GREEN];

function NeuronCanvas(){
  const cv=useRef(null),S=useRef({n:[],p:[],raf:null,lf:0});
  useEffect(()=>{
    const c=cv.current;if(!c)return;
    const ctx=c.getContext("2d"),st=S.current;
    function resize(){c.width=c.offsetWidth;c.height=c.offsetHeight;build();}
    function build(){
      const W=c.width,H=c.height,cnt=Math.min(Math.floor(W*H/13000),70);
      st.n=Array.from({length:cnt},()=>({x:Math.random()*W,y:Math.random()*H,r:1.5+Math.random()*1.5,col:NC[Math.floor(Math.random()*4)],g:0,cn:[]}));
      const D=Math.min(W,H)*.22;
      st.n.forEach(n=>{n.cn=st.n.filter(m=>m!==n).map(m=>({m,d:Math.hypot(m.x-n.x,m.y-n.y)})).filter(({d})=>d<D).sort((a,b)=>a.d-b.d).slice(0,4).map(({m})=>m);});
      st.p=[];
    }
    function fire(n,depth=0){
      if(n.g>0||depth>2)return;n.g=28;
      if(st.p.length<40)n.cn.forEach(t=>st.p.push({fx:n.x,fy:n.y,tx:t.x,ty:t.y,tgt:t,col:n.col,p:0,sp:.009+Math.random()*.013,d:depth}));
    }
    function draw(now){
      const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
      st.n.forEach(n=>n.cn.forEach(m=>{ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(m.x,m.y);ctx.strokeStyle=n.col+"13";ctx.lineWidth=.6;ctx.stroke();}));
      st.p=st.p.filter(p=>{
        p.p+=p.sp;if(p.p>=1){fire(p.tgt,p.d+1);return false;}
        const x=p.fx+(p.tx-p.fx)*p.p,y=p.fy+(p.ty-p.fy)*p.p,p2=Math.max(0,p.p-.15);
        ctx.beginPath();ctx.moveTo(p.fx+(p.tx-p.fx)*p2,p.fy+(p.ty-p.fy)*p2);ctx.lineTo(x,y);ctx.strokeStyle=p.col+"80";ctx.lineWidth=1.2;ctx.stroke();
        ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();
        return true;
      });
      st.n.forEach(n=>{
        if(n.g>0){ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fillStyle=n.col+Math.round((n.g/28)*66).toString(16).padStart(2,"0");ctx.fill();n.g--;}
        ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=n.g>0?n.col:n.col+"4a";ctx.fill();
      });
      if(now-st.lf>450){st.lf=now;const n=st.n[Math.floor(Math.random()*st.n.length)];if(n)fire(n);}
      st.raf=requestAnimationFrame(draw);
    }
    resize();window.addEventListener("resize",resize);st.raf=requestAnimationFrame(draw);
    return()=>{cancelAnimationFrame(st.raf);window.removeEventListener("resize",resize);}
  },[]);
  return React.createElement("canvas",{ref:cv,style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}});
}
