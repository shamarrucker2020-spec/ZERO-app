strong{color:var(--br);font-weight:600}
em{font-style:italic}
code{background:rgba(58,143,255,.12);padding:1px 4px}

// ── NEURON CANVAS ────────────────────────────────────────────────
function NeuronCanvas(){
  var cv=R.useRef(null);

    var c=cv.current; if(!c)return;

    function build(){
      var W=c.width,H=c.height,cnt=Math.min(Math.floor(W*H/14000),65);
      st.n=[];
      for(var i=0;i<cnt;i++){
        st.n.push({x:Math.random()*W,y:Math.random()*H,r:1.5+Math.random()*1.5,col:NC[Math.floor(Math.random()*4)],g:0,cn:[]});
      }
      var D=Math.min(W,H)*.22;
      st.n.forEach(function(n){
        var near=[];
        st.n.forEach(function(m){
          if(m===n)return;
          var d=Math.hypot(m.x-n.x,m.y-n.y);
          if(d<D)near.push({m:m,d:d});

        n.cn=near.slice(0,4).map(function(x){return x.m;});
      });
      st.p=[];
    }
    function fire(n,depth){
      if(n.g>0||(depth||0)>2)return;
      n.g=28;
      if(st.p.length<40){
        n.cn.forEach(function(t){
          st.p.push({fx:n.x,fy:n.y,tx:t.x,ty:t.y,tgt:t,col:n.col,p:0,sp:.009+Math.random()*.013,d:(depth||0)});
        });
      }
    }
    function draw(now){
      var W=c.width,H=c.height;
      ctx.clearRect(0,0,W,H);
      st.n.forEach(function(n){
        n.cn.forEach(function(m){
          ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(m.x,m.y);
          ctx.strokeStyle=n.col+"12";ctx.lineWidth=.6;ctx.stroke();
        });
      });
      var keep=[];
      st.p.forEach(function(p){
        p.p+=p.sp;
        if(p.p>=1){fire(p.tgt,p.d+1);return;}
        var x=p.fx+(p.tx-p.fx)*p.p,y=p.fy+(p.ty-p.fy)*p.p;
        var p2=Math.max(0,p.p-.15);
        ctx.beginPath();ctx.moveTo(p.fx+(p.tx-p.fx)*p2,p.fy+(p.ty-p.fy)*p2);ctx.lineTo(x,y);

        ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();
        keep.push(p);
      });
      st.p=keep;
      st.n.forEach(function(n){
        if(n.g>0){
          var a=Math.round((n.g/28)*66).toString(16).padStart(2,"0");
          ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fillStyle=n.col+a;ctx.fill();
          n.g--;
        }
        ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fillStyle=n.g>0?n.col:n.col+"4a";ctx.fill();
      });
      if(now-st.lf>460){st.lf=now;var ni=Math.floor(Math.random()*st.n.length);if(st.n[ni])fire(st.n[ni]);}
      st.raf=requestAnimationFrame(draw);
    }
    resize();
    window.addEventListener("resize",resize);
    st.raf=requestAnimationFrame(draw);
    return function(){cancelAnimationFrame(st.raf);window.removeEventListener("resize",resize);};
  },[]);
  return h("canvas",{ref:cv,style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}});
}

}

          h("div",{className:"srow"},h("div",{className:"snum snb"},"2"),h("div",{className:"stxt"},h("span",null,"Click "),h("strong",null,'"API Keys"'),h("span",null," in the left menu → "),h("strong",null,'"Create Key"'),h("span",null," → any name is fine"))),

function App(){

  },[inp]);

  function persist(m,f){ls("z-msgs",m.slice(-40));ls("z-facts",f);}
  function stopSpk(){

  }
  function rmEl(){localStorage.removeItem("z-elkey");setElKey("");setElInp("");setElOk(false);}

  async function speakEL(txt){
    var t=txt.replace(/<[^>]+>/g,"").replace(/[*_`#]/g,"").replace(/\n+/g," ").slice(0,700);
    try{
      setStatus("SPEAKING");setSpk(true);
      var r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/pNInz6obpgDQGcFmaJgB/stream",{
        method:"POST",headers:{"Content-Type":"application/json","xi-api-key":elKey},
        body:JSON.stringify({text:t,model_id:"eleven_turbo_v2_5",voice_settings:{stability:.5,similarity_boost:.75}})
      });
      if(!r.ok){setSpk(false);setStatus("READY");return;}
      var blob=await r.blob(),url=URL.createObjectURL(blob),audio=new Audio(url);
      audRef.current=audio;
      audio.onended=function(){setSpk(false);setStatus("READY");URL.revokeObjectURL(url);};
      audio.onerror=function(){setSpk(false);setStatus("READY");};
      await audio.play();
    }catch(e){setSpk(false);setStatus("READY");}
  }

  function speakNative(txt){
    var t=txt.replace(/<[^>]+>/g,"").replace(/[*_`#]/g,"").replace(/\n+/g," ").slice(0,600);
    var u=new SpeechSynthesisUtterance(t);u.rate=.88;u.pitch=.84;u.volume=1;
    function av(){
      var vs=window.speechSynthesis.getVoices();
      var p=vs.find(function(v){return v.name==="Daniel"||v.name.includes("Arthur")||(v.lang==="en-GB"&&!v.name.toLowerCase().includes("female"));})||
        vs.find(function(v){return v.lang.startsWith("en")&&!v.name.toLowerCase().includes("female");})||vs[0];
      if(p)u.voice=p;
    }
    if(window.speechSynthesis.getVoices().length)av();
    else window.speechSynthesis.onvoiceschanged=av;
    u.onstart=function(){setStatus("SPEAKING");setSpk(true);};
    u.onend=u.onerror=function(){setStatus("READY");setSpk(false);};
    window.speechSynthesis.speak(u);
  }

  function speak(txt){if(!vOn)return;if(elKey){speakEL(txt);return;}if(native)speakNative(txt);}

  async function send(text){
    if(!text||!text.trim()||think)return;
    stopSpk();
    var um={role:"user",content:text.trim(),ts:Date.now()};
    var thread=msgs.concat([um]);
    setMsgs(thread);setInp("");setThink(true);setStatus("PROCESSING");
    var fs=Object.keys(facts).length?Object.entries(facts).map(function(e){return "  - "+e[0]+": "+e[1];}).join("\n"):"  None yet.";
    var sys=SYS.replace("{FACTS}",fs);
    var am=thread.slice(-20).map(function(m){return {role:m.role,content:m.content};});
    try{
      var r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":akey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:am})
      });
      if(!r.ok)throw new Error(r.status);
      var data=await r.json();
      var raw=data.content&&data.content[0]?data.content[0].text:"I lost my connection. Please try again.";
      var mm=raw.match(/<mem>([\s\S]*?)<\/mem>/);
      var clean=raw.replace(/<mem>[\s\S]*?<\/mem>/g,"").trim();
      var nf=Object.assign({},facts);
      if(mm){try{var ex=JSON.parse(mm[1]);Object.assign(nf,ex);setFacts(nf);}catch(e){}}
      var am2={role:"assistant",content:clean,ts:Date.now()};
      var fin=thread.concat([am2]);
      setMsgs(fin);persist(fin,nf);
      if(vOn)speak(clean);
    }catch(e){
      setMsgs(function(m){return m.concat([{role:"assistant",content:"Connection issue. Check your API key and internet, then try again.",ts:Date.now()}]);});
    }
    setThink(false);
    if(!vOn||(!elKey&&!native))setStatus("READY");
  }

  function toggleListen(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice input works in Chrome or Edge browsers.");return;}
    if(listen){if(recRef.current)recRef.current.stop();return;}
    stopSpk();
    var rec=new SR();rec.continuous=false;rec.interimResults=true;rec.lang="en-US";
    rec.onstart=function(){setListen(true);setStatus("LISTENING");};
    rec.onresult=function(e){
      var t=Array.from(e.results).map(function(r){return r[0].transcript;}).join("");
      setInp(t);
      if(e.results[e.results.length-1].isFinal){setListen(false);send(t);}
    };
    rec.onend=function(){setListen(false);setStatus(function(s){return s==="LISTENING"?"READY":s;});};
    rec.onerror=function(){setListen(false);setStatus("READY");};
    recRef.current=rec;rec.start();
  }

  function clearAll(){
    if(!confirm("Clear all conversation history and memory?"))return;
    ["z-msgs","z-facts"].forEach(function(k){localStorage.removeItem(k);});
    setMsgs([]);setFacts({});
  }

  if(!akey)return h(Setup,{onDone:onDone});

  var canSpk=native||!!elKey;
  var fkeys=Object.keys(facts);
  var sc=status==="READY"?"sR":status==="LISTENING"?"sL":status==="PROCESSING"?"sP":"sS";

  return h("div",{className:"app"},
    h(NeuronCanvas),
    h("div",{className:"sl"}),

    // HEADER
    h("div",{className:"hdr",style:{position:"relative",zIndex:10}},
      h("div",{className:"lw"},
        h("div",{className:"reactor"},h("div",{className:"ring r1"}),h("div",{className:"ring r2"}),h("div",{className:"ring r3"}),h("div",{className:"core"})),
        h("div",null,h("div",{className:"lt"},"ZERO"),h("div",{className:"ls"},"PERSONAL AI"))
      ),
      h("div",{className:"sbadge "+sc},
        h("div",{className:"dot"}),
        status==="SPEAKING"?h("div",{className:"bars"},h("div",{className:"bar"}),h("div",{className:"bar"}),h("div",{className:"bar"}),h("div",{className:"bar"}),h("div",{className:"bar"})):null,
        h("span",null,status)
      ),
      h("div",{className:"ctrls"},
        spk?h("button",{className:"btn stop",onClick:stopSpk},"⏹ STOP"):
          h("button",{className:"btn"+(vOn&&canSpk?" on":""),onClick:function(){if(canSpk){setVOn(function(v){return !v;});stopSpk();}else setShowEl(function(s){return !s;});}},
            !canSpk?"⚠ VOICE":vOn?(elKey?"🔊 11LABS":"🔊 VOICE"):"🔇 MUTED"),
        h("button",{className:"btn"+(showEl?" elon":""),onClick:function(){setShowEl(function(s){return !s;});}},elOk?"🎙 ✓":"🎙"),
        h("button",{className:"btn"+(showMem?" on":""),onClick:function(){setShowMem(function(s){return !s;});}},
          "🧠"+(fkeys.length>0?" ("+fkeys.length+")":"")),
        h("button",{className:"btn",onClick:clearAll},"⊗")
      )
    ),

    !native&&!elKey?h("div",{className:"vb"},
      h("span",null,"🔇 "),
      h("span",null,"Add "),h("button",{className:"vlink",onClick:function(){setShowEl(true);}},"ElevenLabs key"),h("span",null," for voice output.")
    ):null,

    showEl?h("div",{className:"elp"},
      h("div",{className:"elrow"},
        h("span",{className:"ellbl"},"ELEVENLABS KEY"),
        h("input",{className:"elinp",type:"password",placeholder:"Paste key…",value:elInp,onChange:function(e){setElInp(e.target.value);},onKeyDown:function(e){if(e.key==="Enter")saveEl();}}),
        h("button",{className:"elsave",onClick:saveEl},"SAVE"),
        elKey?h("button",{className:"btn stop",onClick:rmEl},"REMOVE"):null
      ),
      elOk?h("div",{className:"elok"},"✓ ElevenLabs active"):null,

    ):null,

    // LAYOUT
    h("div",{className:"layout"},
      showMem?h("div",{className:"mem"},
        h("div",{className:"phdr"},h("span",null,"MEMORY"),h("span",{style:{color:"rgba(155,92,255,.4)",fontSize:"7px"}},fkeys.length+" FACTS")),
        h("div",{className:"pbody"},
          fkeys.length===0?h("div",{className:"nomem"},"Zero learns about you as you talk."):
          fkeys.map(function(k){return h("div",{className:"fact",key:k},h("div",{className:"fk"},k.replace(/_/g," ")),h("div",{className:"fv"},String(facts[k])));})
        )

      h("div",{className:"chat"},
        h("div",{className:"msgs"},
          msgs.length===0?h("div",{className:"welcome"},
            h("div",{className:"wr"},h("div",{className:"ring r1"}),h("div",{className:"ring r2"}),h("div",{className:"ring r3"}),h("div",{className:"wcore"})),
            h("div",{className:"wtitle"},
              h("span",{style:{color:RED}},"Z"),h("span",{style:{color:BLUE}}," · E"),
              h("span",{style:{color:PURPLE}}," · R"),h("span",{style:{color:GREEN}}," · O")
            ),

            }))
